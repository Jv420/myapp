license:
  key: "PASTE-YOUR-LICENSE-KEY-HERE"
  product: "dynathistore"
  validation-url: "http://localhost:5050/api/licenses/validate"
  fail-closed: true

server:
  id: ""
  public-address: "play.example.com"

orders:
  api-url: "http://localhost:3000/api/plugin/orders"
  api-key: "CHANGE-ME"
  poll-seconds: 15
  execute-only-when-player-online: false
  processed-file: "processed-orders.txt"

products:
  vip:
    commands:
      - "lp user {player} parent set vip"
      - "say {player} heeft VIP gekocht!"
  elite:
    commands:
      - "lp user {player} parent set elite"
  legend:
    commands:
      - "lp user {player} parent set legend"
  crate_gold_3:
    commands:
      - "crate key give {player} gold 3"
  coins_1000:
    commands:
      - "eco give {player} 1000"
  starter_bundle:
    commands:
      - "kit starter {player}"
      - "eco give {player} 500"

messages:
  prefix: "&8[&6DynathiStore&8] &7"
  license-valid: "&aLicentie is geldig."
  license-invalid: "&cLicentie is ongeldig: %reason%"
  order-delivered: "&aBestelling %order% voor %player% is geleverd."
